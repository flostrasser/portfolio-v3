# Configure Netlify builds.
[build]
  publish = "dist/"
  command = "pnpm run build"

# frame-ancestors is only enforced via HTTP header, not via meta-tag CSP.
# The rest of the CSP is generated by Astro and injected as a meta tag.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'none'"
